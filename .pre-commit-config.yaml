repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^charts/.*/templates/
      - id: check-merge-conflict
      - id: check-added-large-files

  # Use local make lint instead of the upstream golangci-lint hook,
  # because the project uses a custom plugin build (.custom-gcl.yml).
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: make lint
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: bash -c 'go test ./internal/...'
        language: system
        types: [go]
        pass_filenames: false

      - id: helm-lint
        name: helm lint
        entry: helm lint charts/omnivol
        language: system
        files: ^charts/
        pass_filenames: false
