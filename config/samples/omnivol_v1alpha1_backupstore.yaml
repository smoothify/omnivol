apiVersion: omnivol.smoothify.com/v1alpha1
kind: BackupStore
metadata:
  name: default-store
spec:
  s3:
    # S3-compatible endpoint — no scheme prefix; use tls: true/false to control TLS.
    endpoint: s3.us-east-1.amazonaws.com
    bucket: my-volsync-backups
    region: us-east-1
    tls: true
    # credentialsSecret is the name of a Secret in the controller namespace
    # (omnivol-system by default). Keys required: access-key-id, secret-access-key.
    # Optionally add a restic-password key here if resticPasswordSecretRef is not set.
    credentialsSecret: omnivol-s3-credentials
    # Optional: reference a different secret/key for the restic encryption password.
    # The secret is also resolved in the controller namespace.
    # If omitted, the controller reads key "restic-password" from credentialsSecret.
    # resticPasswordSecretRef:
    #   name: omnivol-s3-credentials
    #   key: restic-password
