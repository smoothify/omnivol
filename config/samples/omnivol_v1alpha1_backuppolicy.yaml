apiVersion: omnivol.smoothify.com/v1alpha1
kind: BackupPolicy
metadata:
  name: hourly
spec:
  # Name of the BackupStore that provides the S3 endpoint and credentials.
  backupStore: default-store

  # Default backup schedule (cron). The minute field is replaced at provision time
  # with a deterministic per-PVC offset to spread load across the hour.
  schedule: "0 * * * *"

  # REQUIRED — no default. One of: None, Clone, Snapshot, Direct.
  copyMethod: Snapshot

  retain:
    hourly: 24
    daily: 7
    weekly: 4
    monthly: 2

  # Block PV binding until a restore from S3 completes (when a prior backup exists).
  # Set to false to skip automatic restore on new PVC creation.
  restoreOnCreate: true

  # Maximum time to wait for a final pre-delete backup before forcibly removing the PVC.
  deleteTimeout: 5m0s
