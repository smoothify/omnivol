apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: omnivol
    app.kubernetes.io/managed-by: kustomize
  name: manager-role
rules:
  # PersistentVolumes — provisioner creates and deletes PVs
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # PersistentVolumeClaims — provisioner creates/deletes underlying PVCs and
  # watches user PVCs for binding status
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims/status"]
    verbs: ["get", "update", "patch"]

  # StorageClasses — provisioner reads StorageClass parameters;
  # BackupPolicy controller reads to count managed PVCs
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]

  # Secrets — provisioner creates and deletes restic credential secrets;
  # BackupStore controller reads credential secrets;
  # Orphan controller deletes orphaned restic secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events — external-provisioner library emits events; drain watcher emits events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "update", "patch"]

  # Nodes — needed for node affinity resolution and drain watcher
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

  # omnivol CRDs — provisioner reads; controllers read and write status
  - apiGroups: ["omnivol.smoothify.com"]
    resources: ["backuppolicies", "backupstores"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["omnivol.smoothify.com"]
    resources: ["backuppolicies/status", "backupstores/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["omnivol.smoothify.com"]
    resources: ["backuppolicies/finalizers", "backupstores/finalizers"]
    verbs: ["update"]

  # VolSync ReplicationSource — provisioner creates, updates, deletes;
  # orphan controller deletes orphans; drain watcher patches trigger
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources/status"]
    verbs: ["get", "watch"]

  # VolSync ReplicationDestination — provisioner creates and deletes for restore;
  # orphan controller deletes orphans
  - apiGroups: ["volsync.backube"]
    resources: ["replicationdestinations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationdestinations/status"]
    verbs: ["get", "watch"]
