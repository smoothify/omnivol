name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Override version bump (leave empty to auto-detect from conventional commits)'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (compute next version but do not tag or release)'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Tag and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version from conventional commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump != '' && inputs.bump || 'patch' }}
          custom_release_rules: ${{ inputs.bump != '' && format('chore:patch,ci:patch,feat:{0},fix:patch', inputs.bump) || '' }}
          dry_run: ${{ inputs.dry_run }}
          tag_prefix: v

      - name: Summary
        run: |
          echo "## Release summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Previous version | \`${{ steps.tag.outputs.previous_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New version | \`${{ steps.tag.outputs.new_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump type | \`${{ steps.tag.outputs.release_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | \`${{ inputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tag.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generate_release_notes: false

  publish-chart:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_REF_NAME: ${{ needs.release.outputs.new_tag }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart version and appVersion
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/omnivol/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/omnivol/Chart.yaml

      - name: Update default image tag in values.yaml
        run: |
          sed -i "s|tag:.*|tag: \"${{ steps.version.outputs.version }}\"|" charts/omnivol/values.yaml

      - name: Copy latest CRDs into chart
        run: cp config/crd/bases/*.yaml charts/omnivol/crds/

      - name: Package and push chart
        run: |
          helm package charts/omnivol --destination .cr-release-packages
          helm push .cr-release-packages/omnivol-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
