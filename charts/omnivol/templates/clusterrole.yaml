apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "omnivol.fullname" . }}-manager
  labels:
    {{- include "omnivol.labels" . | nindent 4 }}
rules:
  # PersistentVolumes — read-only for node affinity resolution
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]

  # PersistentVolumeClaims — PVC controller manages backups and migration
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # StorageClasses — read-only for cache PVC storage class
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]

  # Secrets — restic credential secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Events — drain watcher emits events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "update", "patch"]

  # Nodes — drain watcher, auto-migration
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

  # Namespaces — privileged-movers annotation
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "patch"]

  # Pods — backup-protection finalizer, scheduling gates
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/finalizers"]
    verbs: ["update"]

  # omnivol CRDs
  - apiGroups: ["omnivol.smoothify.com"]
    resources: ["backuppolicies", "backupstores"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["omnivol.smoothify.com"]
    resources: ["backuppolicies/status", "backupstores/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["omnivol.smoothify.com"]
    resources: ["backuppolicies/finalizers", "backupstores/finalizers"]
    verbs: ["update"]

  # VolSync ReplicationSource
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources/status"]
    verbs: ["get", "watch"]

  # VolSync ReplicationDestination
  - apiGroups: ["volsync.backube"]
    resources: ["replicationdestinations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationdestinations/status"]
    verbs: ["get", "watch"]
